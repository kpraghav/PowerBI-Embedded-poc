<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RDL Self-Service Editor</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    textarea { width: 100%; height: 120px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f4f4f4; }
    button { margin-top: 10px; padding: 8px 12px; cursor: pointer; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h2>RDL Self-Service Editor</h2>
  
  <input type="file" id="rdlFile" accept=".rdl" />
  <div id="editor" class="hidden">
    <h3>Edit Dataset Query</h3>
    <textarea id="queryEditor"></textarea>

    <h3>Edit Columns</h3>
    <table id="columnsTable">
      <thead>
        <tr><th>Column Name</th><th>Expression</th><th>Action</th></tr>
      </thead>
      <tbody></tbody>
    </table>
    <button id="addColumn">Add Column</button><br><br>
    <button id="downloadRDL">Generate & Download RDL</button>
  </div>

  <script>
    let xmlDoc;
    let parser = new DOMParser();
    let serializer = new XMLSerializer();

    $("#rdlFile").on("change", function(evt) {
      let file = evt.target.files[0];
      if (!file) return;

      let reader = new FileReader();
      reader.onload = function(e) {
        let text = e.target.result;
        xmlDoc = parser.parseFromString(text, "application/xml");

        // Load dataset query
        let queryNode = xmlDoc.querySelector("Query > CommandText");
        if (queryNode) {
          $("#queryEditor").val(queryNode.textContent);
        }

        // Load first tablix (columns)
        let tbody = $("#columnsTable tbody");
        tbody.empty();

        let headerCells = xmlDoc.querySelectorAll("TablixColumns TablixColumn");
        let detailCells = xmlDoc.querySelectorAll("TablixRows TablixRow TablixCell");

        if (detailCells.length > 0) {
          detailCells.forEach((cell, i) => {
            let textRun = cell.querySelector("Value");
            let expression = textRun ? textRun.textContent : "";
            let colName = "Column" + (i + 1);
            tbody.append(`
              <tr>
                <td><input type="text" class="colName" value="${colName}"></td>
                <td><input type="text" class="colExpr" value="${expression}"></td>
                <td><button class="removeRow">Remove</button></td>
              </tr>
            `);
          });
        }

        $("#editor").removeClass("hidden");
      };
      reader.readAsText(file);
    });

    // Add new column
    $("#addColumn").on("click", function() {
      $("#columnsTable tbody").append(`
        <tr>
          <td><input type="text" class="colName" value="NewColumn"></td>
          <td><input type="text" class="colExpr" value="=Fields!NewField.Value"></td>
          <td><button class="removeRow">Remove</button></td>
        </tr>
      `);
    });

    // Remove column row
    $(document).on("click", ".removeRow", function() {
      $(this).closest("tr").remove();
    });

    // Generate and download new RDL
    $("#downloadRDL").on("click", function() {
      if (!xmlDoc) return;

      // Update query
      let queryNode = xmlDoc.querySelector("Query > CommandText");
      if (queryNode) {
        queryNode.textContent = $("#queryEditor").val();
      }

      // Update tablix detail cells
      let detailCells = xmlDoc.querySelectorAll("TablixRows TablixRow TablixCell");
      let rows = $("#columnsTable tbody tr");

      rows.each(function(i, row) {
        let expr = $(row).find(".colExpr").val();
        let cell = detailCells[i];
        if (cell) {
          let textRun = cell.querySelector("Value");
          if (textRun) textRun.textContent = expr;
        }
      });

      // Serialize XML back to string
      let newRdl = serializer.serializeToString(xmlDoc);

      // Trigger download
      let blob = new Blob([newRdl], { type: "application/xml" });
      let url = URL.createObjectURL(blob);
      let a = document.createElement("a");
      a.href = url;
      a.download = "modified_report.rdl";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
